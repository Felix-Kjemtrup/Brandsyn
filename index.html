<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Brandsyn">
<meta name="theme-color" content="#1c1c1e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>Brandsynsrapport</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #f2f2f7; color: #1c1c1e; padding: 16px; font-size: 16px; }
.wrap { max-width: 640px; margin: 0 auto; padding-bottom: 40px; }
h1 { font-size: 22px; font-weight: 700; margin-bottom: 2px; }
.sub { font-size: 13px; color: #6c6c70; margin-bottom: 20px; }
.card { background: #fff; border-radius: 13px; padding: 16px; margin-bottom: 12px; }
.card-title { font-size: 11px; font-weight: 600; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 14px; }
.field { margin-bottom: 14px; }
.field:last-child { margin-bottom: 0; }
label { display: block; font-size: 13px; color: #3a3a3c; font-weight: 500; margin-bottom: 5px; }
input[type=text], input[type=date], textarea {
  display: block; width: 100%; padding: 12px 14px; font-size: 16px;
  font-family: -apple-system, sans-serif; background: #f2f2f7;
  border: 1.5px solid #e5e5ea; border-radius: 10px; color: #1c1c1e;
  -webkit-appearance: none; appearance: none; outline: none;
}
input[type=text]:focus, input[type=date]:focus, textarea:focus {
  border-color: #007aff; background: #fff;
}
textarea { resize: vertical; min-height: 72px; line-height: 1.5; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* Inspektør custom select */
.insp-select-wrap { position: relative; z-index: 100; }
.insp-select-btn {
  display: block; width: 100%; padding: 12px 14px; font-size: 16px;
  font-family: -apple-system, sans-serif; background: #f2f2f7;
  border: 1.5px solid #e5e5ea; border-radius: 10px; color: #1c1c1e;
  text-align: left; cursor: pointer; -webkit-appearance: none;
}
.insp-select-btn.placeholder { color: #8e8e93; }
.insp-dropdown {
  display: none; position: absolute; left: 0; right: 0; top: calc(100% + 4px);
  background: #fff; border-radius: 13px; overflow-y: auto; max-height: 320px; z-index: 9999;
  box-shadow: 0 8px 32px rgba(0,0,0,.25);
}
.insp-dropdown.open { display: block; }
.insp-option {
  display: block; width: 100%; padding: 14px 16px; font-size: 15px;
  font-family: -apple-system, sans-serif; background: none; border: none;
  border-bottom: 1px solid #f2f2f7; text-align: left; cursor: pointer; color: #1c1c1e;
}
.insp-option:last-child { border-bottom: none; }
.insp-placeholder { color: #8e8e93; border-bottom: 1px solid #e5e5ea; }
.insp-section { color: #8e8e93; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; background: #f9f9f9; pointer-events: none; cursor: default; border-bottom: 1px solid #e5e5ea; }
.insp-option:active { background: #f2f2f7; }

/* Afgørelse cards */
.afg-card { border: 1.5px solid #e5e5ea; border-radius: 13px; margin-bottom: 10px; position: relative; }
.afg-header { display: flex; align-items: center; gap: 8px; padding: 11px 14px; background: #f9f9fb; }
.afg-badge { font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
.bp { background: #fce8e8; color: #c0392b; }
.bf { background: #fef3e2; color: #d35400; }
.ba { background: #e8f4fd; color: #1a6fab; }
.afg-num { font-size: 12px; color: #8e8e93; }
.afg-body { padding: 14px; overflow: visible; }
.afg-remove {
  margin-left: auto; background: none; border: none; font-size: 24px;
  color: #c7c7cc; padding: 0 6px; cursor: pointer; line-height: 1;
  min-width: 36px; min-height: 36px; display: flex; align-items: center; justify-content: center;
}
.obs-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: flex-start; }
.obs-num {
  min-width: 26px; height: 26px; border-radius: 50%; background: #f2f2f7;
  border: 1.5px solid #e5e5ea; display: flex; align-items: center;
  justify-content: center; font-size: 11px; color: #8e8e93; margin-top: 9px; flex-shrink: 0;
}
.obs-del {
  background: none; border: none; font-size: 20px; color: #c7c7cc;
  padding: 6px 4px; margin-top: 5px; min-width: 32px; min-height: 36px; cursor: pointer;
}
.frist-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }

/* Buttons */
.add-obs-btn {
  display: block; width: 100%; padding: 10px; font-size: 14px; color: #8e8e93;
  background: none; border: 1.5px dashed #d1d1d6; border-radius: 10px;
  font-family: -apple-system, sans-serif; cursor: pointer; margin-top: 6px;
  min-height: 44px;
}
.add-afg-btn {
  display: block; width: 100%; padding: 13px; font-size: 15px; font-weight: 500;
  color: #8e8e93; background: none; border: 2px dashed #d1d1d6; border-radius: 13px;
  font-family: -apple-system, sans-serif; cursor: pointer; min-height: 50px;
}

/* Type picker modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4);
  z-index: 1000; align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: #fff; border-radius: 20px 20px 0 0; padding: 20px 16px 40px;
  width: 100%; max-width: 640px;
}
.modal-title { font-size: 14px; color: #6c6c70; text-align: center; margin-bottom: 16px; font-weight: 500; }
.type-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 14px; }
.type-tile {
  padding: 16px 8px; border: 2px solid #e5e5ea; border-radius: 14px;
  cursor: pointer; text-align: center; background: #fff;
  font-family: -apple-system, sans-serif; min-height: 80px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.type-tile:active { opacity: .7; }
.tile-icon { font-size: 24px; margin-bottom: 5px; }
.tile-label { font-size: 13px; font-weight: 600; color: #1c1c1e; }
.tile-desc { font-size: 11px; color: #8e8e93; margin-top: 2px; }
.cancel-tile {
  display: block; width: 100%; padding: 14px; font-size: 16px; font-weight: 600;
  color: #007aff; background: #f2f2f7; border: none; border-radius: 13px;
  font-family: -apple-system, sans-serif; cursor: pointer; min-height: 50px;
}

/* Download */
.dl-btn {
  display: block; width: 100%; padding: 16px; font-size: 17px; font-weight: 700;
  background: #1c1c1e; border: none; border-radius: 14px; color: #fff;
  font-family: -apple-system, sans-serif; cursor: pointer; margin-top: 8px;
  min-height: 54px; letter-spacing: .01em;
}
.dl-btn:active { background: #3a3a3c; }
.status { margin-top: 12px; font-size: 14px; text-align: center; min-height: 20px; }
.ok { color: #1a7f4b; font-weight: 500; }
.err { color: #c0392b; }

@media (max-width: 400px) {
  .row2, .frist-row { grid-template-columns: 1fr; }
  .type-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="wrap">
  <h1>Brandsynsrapport</h1>
  <p class="sub">Sydvestjysk Brandvæsen</p>

  <div class="card">
    <div class="card-title">Ejendomsoplysninger</div>
    <div class="field"><label>Adresse</label><input type="text" id="adresse" placeholder="Vejnavn, husnr., postnr. by" autocomplete="off"></div>
    <div class="row2">
      <div class="field"><label>Ejer / ansvarlig</label><input type="text" id="ejer" placeholder="Navn eller firma" autocomplete="off"></div>
      <div class="field"><label>Deltager</label><input type="text" id="cvr" placeholder="Navn på deltager" autocomplete="off"></div>
    </div>
    <div class="field" style="max-width:50%"><label>Dato for brandsyn</label><input type="date" id="dato"></div>
  </div>

  <div class="card">
    <div class="card-title">Afgørelser</div>
    <div id="afg-list"></div>
    <button class="add-afg-btn" id="add-btn" onclick="openPicker()">+ Tilføj afgørelse</button>
  </div>

  <div class="card">
    <div class="card-title">Frist og opfølgning</div>
    <div class="row2">
      <div class="field"><label>Frist for udbedring</label><input type="date" id="frist"></div>
      <div class="field"><label>Kontrolbesøg (valgfrit)</label><input type="date" id="kontrol"></div>
    </div>
    <div class="field" style="margin-top:12px"><label>Yderligere bemærkninger</label><textarea id="ekstra" placeholder="Evt. lovhjemmel, særlige betingelser..."></textarea></div>
  </div>

  <div class="card">
    <div class="card-title">Inspektør</div>
    <div class="field">
      <label>Vælg inspektør</label>
      <div class="insp-select-wrap">
        <button class="insp-select-btn placeholder" id="insp-btn" onclick="toggleInsp(event)">— Vælg inspektør —</button>
        <div class="insp-dropdown" id="insp-drop">
          <button class="insp-option insp-placeholder" onclick="pickInsp('','')">— Vælg inspektør —</button>
          <button class="insp-option" onclick="pickInsp('Felix Kjemtrup','Viceberedskabsinspektør')">Felix Kjemtrup — Viceberedskabsinspektør</button>
          <button class="insp-option" onclick="pickInsp('Pernille Madsen','Beredskabsinspektør')">Pernille Madsen — Beredskabsinspektør</button>
          <button class="insp-option" onclick="pickInsp('Søren Christensen','Beredskabsinspektør')">Søren Christensen — Beredskabsinspektør</button>
          <button class="insp-option" onclick="pickInsp('Frederikke Stjernholm Thomsen','Viceberedskabsinspektør')">Frederikke Stjernholm Thomsen — Viceberedskabsinspektør</button>
          <button class="insp-option" onclick="pickInsp('Jan Christensen','Områdeleder Tilsyn/Vejledning')">Jan Christensen — Områdeleder Tilsyn/Vejledning</button>
          <button class="insp-option" onclick="pickInsp('Michael Due Thomsen','Beredskabsinspektør')">Michael Due Thomsen — Beredskabsinspektør</button>
        </div>
      </div>
    </div>
    <input type="hidden" id="inspektoer" value="">
    <input type="hidden" id="titel" value="">
  </div>

  <button class="dl-btn" onclick="genPDF()">⬇ Download PDF</button>
  <div class="status" id="status"></div>
</div>

<!-- Type picker modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal-box">
    <p class="modal-title">Vælg type afgørelse</p>
    <div class="type-grid">
      <button class="type-tile" style="border-color:#c0392b;background:#fce8e8" onclick="addAfg('paabud')">
        <div class="tile-icon">⚠️</div><div class="tile-label">Påbud</div><div class="tile-desc">Krav om udbedring</div>
      </button>
      <button class="type-tile" style="border-color:#d35400;background:#fef3e2" onclick="addAfg('forbud')">
        <div class="tile-icon">⛔</div><div class="tile-label">Forbud</div><div class="tile-desc">Brug forbydes</div>
      </button>
      <button class="type-tile" style="border-color:#1a6fab;background:#e8f4fd" onclick="addAfg('anbefaling')">
        <div class="tile-icon">✅</div><div class="tile-label">Anbefaling</div><div class="tile-desc">Vejledende råd</div>
      </button>
    </div>
    <button class="cancel-tile" onclick="closePicker()">Annuller</button>
  </div>
</div>

<script>

let afgCount = 0;

// ── Inspektør dropdown ──────────────────────────────────────
function toggleInsp(e) {
  e.stopPropagation();
  document.getElementById('insp-drop').classList.toggle('open');
}
function pickInsp(navn, stilling) {
  document.getElementById('inspektoer').value = navn;
  document.getElementById('titel').value = stilling;
  const btn = document.getElementById('insp-btn');
  if(navn) {
    btn.textContent = navn + ' — ' + stilling;
    btn.classList.remove('placeholder');
  } else {
    btn.textContent = '— Vælg inspektør —';
    btn.classList.add('placeholder');
  }
  document.getElementById('insp-drop').classList.remove('open');
}
document.addEventListener('click', function(e) {
  // Close inspektør dropdown
  const drop = document.getElementById('insp-drop');
  if (!document.getElementById('insp-btn').contains(e.target)) drop.classList.remove('open');
  // Close any open hjemmel dropdowns
  document.querySelectorAll('[id$="-hjemmel-drop"].open').forEach(function(d) {
    const btnId = d.id.replace('-drop','');
    const btn = document.getElementById(btnId+'-btn') || document.getElementById(btnId.replace('-hjemmel','')+'-hjemmel-btn');
    if(btn && !btn.contains(e.target)) d.classList.remove('open');
  });
});

function toggleHjemmel(e, id) {
  e.stopPropagation();
  const drop = document.getElementById(id+'-hjemmel-drop');
  const btn = document.getElementById(id+'-hjemmel-btn');
  const isOpen = drop.classList.contains('open');
  // Close all open dropdowns first
  document.querySelectorAll('.insp-dropdown.open').forEach(function(d) { d.classList.remove('open'); });
  if(!isOpen) {
    drop.classList.add('open');
    // Scroll into view on mobile
    setTimeout(function() { btn.scrollIntoView({behavior:'smooth', block:'nearest'}); }, 100);
  }
}

function pickHjemmel(id, val) {
  const hidden = document.getElementById(id+'-hjemmel');
  if(hidden) hidden.value = val;
  const btn = document.getElementById(id+'-hjemmel-btn');
  if(btn) {
    if(val) { btn.textContent = val; btn.classList.remove('placeholder'); }
    else { btn.textContent = '— Vælg lovhjemmel —'; btn.classList.add('placeholder'); }
  }
  const drop = document.getElementById(id+'-hjemmel-drop');
  if(drop) drop.classList.remove('open');
}

// ── Afgørelse picker ────────────────────────────────────────
function openPicker() { document.getElementById('modal').classList.add('open'); }
function closePicker() { document.getElementById('modal').classList.remove('open'); }
function closeModal(e) { if (e.target === document.getElementById('modal')) closePicker(); }

// ── Afgørelse logic ─────────────────────────────────────────
function addAfg(type) {
  closePicker();
  afgCount++;
  const id = 'afg-' + afgCount;
  const lbl = {paabud:'Påbud', forbud:'Forbud', anbefaling:'Anbefaling'};
  const bc  = {paabud:'bp', forbud:'bf', anbefaling:'ba'};
  const bdr = {paabud:'#c0392b', forbud:'#d35400', anbefaling:'#1a6fab'};
  const list = document.getElementById('afg-list');
  const n = list.children.length + 1;
  const hasDrop = (type === 'paabud' || type === 'forbud');

  const d = document.createElement('div');
  d.className = 'afg-card'; d.id = id; d.style.borderColor = bdr[type];

  // Lovhjemmel felt - dropdown til påbud/forbud, fritekst til anbefaling
  const hjemmelHTML = hasDrop ? `
    <input type="hidden" id="${id}-hjemmel" value="">
    <div class="insp-select-wrap">
      <button class="insp-select-btn placeholder" id="${id}-hjemmel-btn" onclick="toggleHjemmel(event,'${id}')">— Vælg lovhjemmel —</button>
      <div class="insp-dropdown" id="${id}-hjemmel-drop">
        <button class="insp-option insp-placeholder" onclick="pickHjemmel('${id}','')">— Vælg lovhjemmel —</button>
        <button class="insp-option insp-section">7.3 Brug- og driftsmæssige forhold</button>
        <button class="insp-option" onclick="pickHjemmel('${id}','7.3.1. Markering, skiltning, opslag og planer')">7.3.1. Markering, skiltning, opslag og planer</button>
        <button class="insp-option" onclick="pickHjemmel('${id}','7.3.2.1. Gangarealer i flugtveje')">7.3.2.1. Gangarealer i flugtveje</button>
        <button class="insp-option" onclick="pickHjemmel('${id}','7.3.2.2. Doere i flugtveje')">7.3.2.2. Døre i flugtveje</button>
        <button class="insp-option" onclick="pickHjemmel('${id}','7.3.2.3. Redningsaabninger')">7.3.2.3. Redningsåbninger</button>
        <button class="insp-option" onclick="pickHjemmel('${id}','7.3.2.4. Tagredning')">7.3.2.4. Tagredning</button>
        <button class="insp-option" onclick="pickHjemmel('${id}','7.3.3. Flugtvejs- og panikbelysning')">7.3.3. Flugtvejs- og panikbelysning</button>
        <button class="insp-option" onclick="pickHjemmel('${id}','7.3.4. Varslingsanlaeg')">7.3.4. Varslingsanlæg</button>
        <button class="insp-option" onclick="pickHjemmel('${id}','7.3.5.1. Haandildslukkere')">7.3.5.1. Håndildslukkere</button>
        <button class="insp-option" onclick="pickHjemmel('${id}','7.3.5.2. Slangevinder')">7.3.5.2. Slangevinder</button>
        <button class="insp-option" onclick="pickHjemmel('${id}','7.3.5.3. Brandtaepper')">7.3.5.3. Brandtæpper</button>
        <button class="insp-option" onclick="pickHjemmel('${id}','7.3.6. Generelle ordensregler')">7.3.6. Generelle ordensregler</button>
        <button class="insp-option" onclick="pickHjemmel('${id}','7.3.7. Personbelastning')">7.3.7. Personbelastning</button>
        <button class="insp-option insp-section">7.5 Brandtekniske installationer</button>
        <button class="insp-option" onclick="pickHjemmel('${id}','7.5.1. ABA-anlaeg')">7.5.1. ABA-anlæg (Automatisk brandalarmanlæg)</button>
        <button class="insp-option" onclick="pickHjemmel('${id}','7.5.2. AVS-anlaeg')">7.5.2. AVS-anlæg (Automatisk sprinkleranlæg)</button>
        <button class="insp-option" onclick="pickHjemmel('${id}','7.5.3. AVA-anlaeg')">7.5.3. AVA-anlæg (Varslingsanlæg)</button>
        <button class="insp-option" onclick="pickHjemmel('${id}','7.5.4. Roegalarmanlaeg')">7.5.4. Røgalarmanlæg</button>
        <button class="insp-option" onclick="pickHjemmel('${id}','7.5.5. Flugtvejs- og panikbelysningsanlaeg')">7.5.5. Flugtvejs- og panikbelysningsanlæg</button>
        <button class="insp-option" onclick="pickHjemmel('${id}','7.5.6. Slangevinde')">7.5.6. Slangevinde</button>
        <button class="insp-option" onclick="pickHjemmel('${id}','7.5.7. ABDL-anlaeg')">7.5.7. ABDL-anlæg (Automatisk branddørlukningsanlæg)</button>
        <button class="insp-option" onclick="pickHjemmel('${id}','7.5.14. Stigroer')">7.5.14. Stigrør</button>
        <button class="insp-option" onclick="pickHjemmel('${id}','7.5.17. Haandildslukker')">7.5.17. Håndildslukker</button>
        <button class="insp-option" onclick="pickHjemmel('${id}','7.5.18. Branddasker')">7.5.18. Branddasker</button>
        <button class="insp-option" onclick="pickHjemmel('${id}','7.5.19. Brandtaepper')">7.5.19. Brandtæppe</button>
        <button class="insp-option insp-section">7.6 Passiv brandsikring</button>
        <button class="insp-option" onclick="pickHjemmel('${id}','7.6.1. Aarligt eftersyn af passiv brandsikring')">7.6.1. Årligt eftersyn af passiv brandsikring</button>
        <button class="insp-option" onclick="pickHjemmel('${id}','7.6.2. Installationsgennemfoeringer')">7.6.2. Installationsgennemføringer</button>
      </div>
    </div>` : `<input type="text" id="${id}-hjemmel" placeholder="Lovhjemmel (valgfrit)" autocomplete="off">`;

  d.innerHTML = `
    <div class="afg-header">
      <span class="afg-num">Afgørelse ${n}</span>
      <span class="afg-badge ${bc[type]}">${lbl[type]}</span>
      <button class="afg-remove" onclick="removeAfg('${id}')">×</button>
    </div>
    <div class="afg-body">
      <input type="hidden" id="${id}-type" value="${type}">
      <div class="field"><label>Titel / kort beskrivelse</label><input type="text" id="${id}-titel" placeholder="f.eks. Manglende branddør..." autocomplete="off"></div>
      <label style="font-size:13px;color:#3a3a3c;font-weight:500;margin-bottom:6px;display:block">Observationer</label>
      <div id="${id}-obs">
        <div class="obs-row"><div class="obs-num">1</div><textarea placeholder="Beskriv observation..."></textarea><button class="obs-del" onclick="removeObs(this)">×</button></div>
      </div>
      <button class="add-obs-btn" onclick="addObs('${id}-obs')">+ Tilføj observation</button>
      <div class="frist-row">
        <div><label style="font-size:13px;color:#3a3a3c;font-weight:500;margin-bottom:5px;display:block">Individuel frist</label><input type="date" id="${id}-frist"></div>
        <div><label style="font-size:13px;color:#3a3a3c;font-weight:500;margin-bottom:5px;display:block">Lovhjemmel</label>${hjemmelHTML}</div>
      </div>
    </div>`;
  list.appendChild(d);
  renum();
}

function removeAfg(id) { const e = document.getElementById(id); if(e) e.remove(); renum(); }
function renum() {
  Array.from(document.querySelectorAll('#afg-list .afg-card')).forEach((c,i) => {
    const e = c.querySelector('.afg-num'); if(e) e.textContent = 'Afgørelse '+(i+1);
  });
}
function addObs(lid) {
  const l = document.getElementById(lid);
  const n = l.children.length + 1;
  const r = document.createElement('div'); r.className = 'obs-row';
  r.innerHTML = `<div class="obs-num">${n}</div><textarea placeholder="Beskriv observation..."></textarea><button class="obs-del" onclick="removeObs(this)">×</button>`;
  l.appendChild(r);
}
function removeObs(btn) {
  const l = btn.closest('[id$="-obs"]');
  if(l && l.children.length > 1) {
    btn.closest('.obs-row').remove();
    Array.from(l.children).forEach((r,i) => { const n=r.querySelector('.obs-num'); if(n) n.textContent=i+1; });
  }
}
function getAfgs() {
  return Array.from(document.querySelectorAll('#afg-list .afg-card')).map((c,i) => {
    const id = c.id;
    return {
      num: i+1,
      type: document.getElementById(id+'-type').value,
      titel: document.getElementById(id+'-titel').value.trim(),

// Linjehøjder og spacing
const LH = 16;   // normal linjehøjde
const LHS = 12;  // lille linjehøjde

function enc(s) {
  return String(s||'')
    .replace(/æ/g,'ae').replace(/ø/g,'oe').replace(/å/g,'aa')
    .replace(/Æ/g,'Ae').replace(/Ø/g,'Oe').replace(/Å/g,'Aa')
    .replace(/\(/g,'\\(').replace(/\)/g,'\\)')
    .replace(/[^ -~]/g,'?');
}

function wrap(txt, maxW, fontSize) {
  // avgCharWidth ~ fontSize * 0.52 for Helvetica
  const avgChar = fontSize * 0.52;
  const maxChars = Math.floor(maxW / avgChar);
  const words = enc(txt).split(' ');
  const lines = []; let line = '';
  for(const w of words) {
    const test = line ? line+' '+w : w;
    if(test.length > maxChars) {
      if(line) lines.push(line);
      line = w;
    } else line = test;
  }
  if(line) lines.push(line);
  return lines.length ? lines : [''];
}

// Page state
let pages = [], cur = [], y = 0;
const W=595, H=842, M=52, CW=W-M*2;
const MARGIN_BOTTOM = 70;

function newPage() {
  // footer on current page
  addFooter();
  pages.push(cur);
  cur = [];
  y = H - 55;
}

function checkY(need) {
  if(y - need < MARGIN_BOTTOM) newPage();
}

function addFooter() {
  cur.push(`0.75 0.75 0.75 rg ${M} 32 ${CW} 0.5 re f`);
  cur.push(`0.6 0.6 0.6 rg BT /F1 8 Tf ${M} 20 Td (Sydvestjysk Brandvaesen) Tj ET`);
  cur.push(`BT /F1 8 Tf ${W-M-95} 20 Td (Genereret: ${enc(new Date().toLocaleDateString('da-DK'))}) Tj ET`);
}

function cm(r,g,b) { return `${(r/255).toFixed(3)} ${(g/255).toFixed(3)} ${(b/255).toFixed(3)}`; }

function sh(title) {
  checkY(35);
  y -= 8;
  cur.push(`0.91 0.91 0.91 rg ${M} ${y-4} ${CW} 16 re f`);
  cur.push(`0.3 0.3 0.3 rg BT /F2 8 Tf ${M+5} ${y+6} Td (${enc(title).toUpperCase()}) Tj ET`);
  y -= 24;
}

function fieldPair(lbl1, val1, lbl2, val2) {
  const x2 = M + CW/2 + 5;
  checkY(30);
  if(lbl1) cur.push(`0.5 0.5 0.5 rg BT /F2 8 Tf ${M} ${y+12} Td (${enc(lbl1)}) Tj ET`);
  if(lbl2 && val2) cur.push(`0.5 0.5 0.5 rg BT /F2 8 Tf ${x2} ${y+12} Td (${enc(lbl2)}) Tj ET`);
  if(val1) cur.push(`0 0 0 rg BT /F1 10 Tf ${M} ${y} Td (${enc(val1)}) Tj ET`);
  if(val2) cur.push(`0 0 0 rg BT /F1 10 Tf ${x2} ${y} Td (${enc(val2)}) Tj ET`);
  y -= 26;
}

function textBlock(lbl, txt, fontSize, maxW) {
  if(!txt) return;
  checkY(28);
  if(lbl) {
    cur.push(`0.5 0.5 0.5 rg BT /F2 8 Tf ${M} ${y+12} Td (${enc(lbl)}) Tj ET`);
  }
  const lines = wrap(txt, maxW||CW, fontSize||10);
  for(const l of lines) {
    checkY(LH);
    cur.push(`0 0 0 rg BT /F1 ${fontSize||10} Tf ${M} ${y} Td (${l}) Tj ET`);
    y -= LH;
  }
  y -= 6;
}

function makePDF(adresse, dato, ejer, cvr, afgs, frist, kontrol, ekstra, insp, titel) {
  // Reset state
  pages = []; cur = []; y = H - 55;

  const TC={paabud:[192,57,43], forbud:[211,84,0], anbefaling:[26,107,171]};
  const TL={paabud:'PAABUD', forbud:'FORBUD', anbefaling:'ANBEFALING'};
  const TD={
    paabud:'Der gives hermed paabud om udbedring inden fristen.',
    forbud:'Der nedlaegges hermed forbud mod brug af ejendom/lokale.',
    anbefaling:'Vejledende anbefaling til forbedring af brandsikkerheden.'
  };
  const uniq = [...new Set(afgs.map(a=>a.type))];
  const hc = uniq.length===1 ? TC[uniq[0]] : [50,50,50];

  // ── Header bar ──
  cur.push(`${cm(...hc)} rg 0 ${H-42} ${W} 42 re f`);
  cur.push(`1 1 1 rg BT /F2 9 Tf ${M} ${H-27} Td (SYDVESTJYSK BRANDVAESEN) Tj ET`);
  const ts = enc(uniq.map(t=>TL[t]).join(' / '));
  cur.push(`1 1 1 rg BT /F1 9 Tf ${W-M-ts.length*5.2} ${H-27} Td (${ts}) Tj ET`);

  // ── Logo (as filled rectangle placeholder + text) ──
  // Logo placed right side, next to title
  cur.push(`DO_LOGO_HERE`); // placeholder, replaced below

  // ── Titel ──
  cur.push(`0 0 0 rg BT /F2 20 Tf ${M} ${H-75} Td (Brandsynsrapport) Tj ET`);
  y = H - 98;

  if(dato) {
    cur.push(`0.45 0.45 0.45 rg BT /F1 9 Tf ${M} ${y} Td (Dato for brandsyn: ${enc(dato)}) Tj ET`);
    y -= 16;
  }
  y -= 4;

  // ── Ejendomsoplysninger ──
  sh('Ejendomsoplysninger');
  if(adresse) {
    cur.push(`0.5 0.5 0.5 rg BT /F2 8 Tf ${M} ${y+12} Td (Adresse) Tj ET`);
    const al = wrap(adresse, CW, 10);
    for(const l of al) {
      checkY(LH);
      cur.push(`0 0 0 rg BT /F1 10 Tf ${M} ${y} Td (${l}) Tj ET`);
      y -= LH;
    }
    y -= 8;
  }
  if(ejer || cvr) fieldPair('Ejer/ansvarlig', ejer, 'Deltager', cvr);

  // ── Afgørelser ──
  for(const afg of afgs) {
    const c = TC[afg.type];
    checkY(50);
    y -= 8;

    // Farvet boks
    const boxH = 32;
    cur.push(`${cm(Math.min(255,c[0]+168),Math.min(255,c[1]+168),Math.min(255,c[2]+168))} rg ${M} ${y-boxH+14} ${CW} ${boxH} re f`);
    cur.push(`${cm(...c)} rg ${M} ${y-boxH+14} 5 ${boxH} re f`);
    const at = enc(`${afg.num}. ${TL[afg.type]}${afg.titel ? ' - '+afg.titel : ''}`);
    cur.push(`${cm(...c)} rg BT /F2 10 Tf ${M+10} ${y+3} Td (${at}) Tj ET`);
    cur.push(`${cm(...c)} rg BT /F1 8 Tf ${M+10} ${y-10} Td (${enc(TD[afg.type])}) Tj ET`);
    y -= boxH + 8;

    // Observationer
    for(let i=0; i<afg.obs.length; i++) {
      const olines = wrap(afg.obs[i], CW-22, 10);
      checkY(olines.length * LH + 10);
      cur.push(`${cm(...c)} rg BT /F2 9 Tf ${M+5} ${y} Td (${i+1}.) Tj ET`);
      for(const l of olines) {
        cur.push(`0 0 0 rg BT /F1 10 Tf ${M+20} ${y} Td (${l}) Tj ET`);
        y -= LH;
      }
      y -= 5;
    }

    // Frist + hjemmel
    const m2 = [];
    if(afg.frist) m2.push('Frist: '+enc(afg.frist));
    if(afg.hjemmel) m2.push('Hjemmel: '+enc(afg.hjemmel));
    if(m2.length) {
      checkY(16);
      cur.push(`0.55 0.55 0.55 rg BT /F1 8 Tf ${M+5} ${y} Td (${m2.join('   |   ')}) Tj ET`);
      y -= 16;
    }
    y -= 6;
  }

  // ── Frist/opfølgning ──
  if(frist || kontrol || ekstra) {
    sh('Generel frist og opfoelgning');
    if(frist || kontrol) fieldPair('Frist for udbedring', frist, 'Kontrolbesoeg', kontrol);
    if(ekstra) textBlock('Yderligere bemaerkninger', ekstra, 10, CW);
  }

  // ── Inspektør ──
  if(insp || titel) {
    sh('Inspektoer');
    fieldPair('Navn', insp, 'Stilling', titel);
  }

  // Finish last page
  addFooter();
  pages.push(cur);

  // ── Byg PDF ──
  // Build image XObject for logo (PNG as DCT/raw - use JPEG approximation via canvas)
  // Convert logo to JPEG via canvas for PDF embedding
  return buildPDFWithLogo(pages, W, H, M);
}

function buildPDFWithLogo(allPages, W, H, M) {
  // Convert logo PNG to JPEG using canvas
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      canvas.width = 80; canvas.height = 80;
      const ctx = canvas.getContext('2d');
      // White background for JPEG
      ctx.fillStyle = 'white';
      ctx.fillRect(0,0,80,80);
      ctx.drawImage(img, 0, 0, 80, 80);
      const jpegB64 = canvas.toDataURL('image/jpeg', 0.92).split(',')[1];
      const jpegBytes = atob(jpegB64);
      resolve(assemblePDF(allPages, W, H, jpegBytes));
    };
    img.src = 'data:image/png;base64,' + LOGO_B64;
  });
}

function assemblePDF(allPages, W, H, jpegBytes) {
  const nPages = allPages.length;
  let pdf = '%PDF-1.4\n%\xe2\xe3\xcf\xd3\n';
  const offs = {};

  function wo(id, header, stream) {
    offs[id] = pdf.length;
    if(stream !== undefined) {
      pdf += id+' 0 obj\n'+header+'\nstream\n'+stream+'\nendstream\nendobj\n';
    } else {
      pdf += id+' 0 obj\n'+header+'\nendobj\n';
    }
  }

  // IDs:
  // 1 = catalog, 2 = pages
  // 3 = F1 (Helvetica), 4 = F2 (Helvetica-Bold)
  // 5 = logo image XObject
  // 6..6+nPages-1 = content streams
  // 6+nPages..6+2*nPages-1 = page objects

  const contentBase = 6;
  const pageBase = contentBase + nPages;
  const pageIds = Array.from({length:nPages}, (_,i) => contentBase+i);
  const pageObjIds = Array.from({length:nPages}, (_,i) => pageBase+i);
  const maxId = pageBase + nPages;

  wo(1, '<< /Type /Catalog /Pages 2 0 R >>');
  wo(2, `<< /Type /Pages /Kids [${pageObjIds.map(i=>i+' 0 R').join(' ')}] /Count ${nPages} >>`);
  wo(3, '<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica /Encoding /WinAnsiEncoding >>');
  wo(4, '<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold /Encoding /WinAnsiEncoding >>');
  wo(5, `<< /Type /XObject /Subtype /Image /Width 80 /Height 80 /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${jpegBytes.length} >>`, jpegBytes);

  for(let i=0; i<nPages; i++) {
    // Replace logo placeholder in page 0
    let streamLines = allPages[i];
    if(i === 0) {
      streamLines = streamLines.map(l => l === 'DO_LOGO_HERE'
        ? `q 50 0 0 50 ${W-M-52} ${H-92} cm /Im1 Do Q`
        : l);
    } else {
      streamLines = streamLines.filter(l => l !== 'DO_LOGO_HERE');
    }
    const stream = streamLines.join('\n');
    wo(pageIds[i], `<< /Length ${stream.length} >>`, stream);
    wo(pageObjIds[i], `<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${W} ${H}] /Contents ${pageIds[i]} 0 R /Resources << /Font << /F1 3 0 R /F2 4 0 R >> /XObject << /Im1 5 0 R >> >> >>`);
  }

  const xoff = pdf.length;
  pdf += `xref\n0 ${maxId+1}\n`;
  pdf += '0000000000 65535 f \n';
  for(let i=1; i<=maxId; i++) {
    pdf += String(offs[i]||0).padStart(10,'0')+' 00000 n \n';
  }
  pdf += `trailer\n<< /Size ${maxId+1} /Root 1 0 R >>\nstartxref\n${xoff}\n%%EOF`;
  return pdf;
}

async function genPDF() {
  const adresse = document.getElementById('adresse').value.trim();
  const afgs = getAfgs();
  if(!adresse) { setStatus('Udfyld venligst adressen.', 'err'); return; }
  if(!afgs.length) { setStatus('Tilføj mindst én afgørelse.', 'err'); return; }

  setStatus('Genererer PDF...', '');
  try {
    const pdf = await makePDF(
      adresse,
      document.getElementById('dato').value,
      document.getElementById('ejer').value,
      document.getElementById('cvr').value,
      afgs,
      document.getElementById('frist').value,
      document.getElementById('kontrol').value,
      document.getElementById('ekstra').value,
      document.getElementById('inspektoer').value,
      document.getElementById('titel').value
    );
    const fname = 'Brandsynsrapport_'+adresse.replace(/[^a-zA-Z0-9]/g,'_')
      +'_'+(document.getElementById('dato').value||new Date().toISOString().slice(0,10))+'.pdf';

    // On iPhone Safari, open in new tab so user can share/save
    const blob = new Blob([pdf], {type:'application/pdf'});
    const url = URL.createObjectURL(blob);

    // Try download link first, fallback to window.open
    const a = document.createElement('a');
    a.href = url;
    a.download = fname;
    a.target = '_blank';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 3000);
    setStatus('✓ PDF klar! Tryk Del for at sende til fejo@svjb.dk', 'ok');
  } catch(e) {
    setStatus('Fejl: '+e.message, 'err');
  }
}

function setStatus(m, t) { const e=document.getElementById('status'); e.textContent=m; e.className='status '+t; }
document.getElementById('dato').value = new Date().toISOString().slice(0,10);
